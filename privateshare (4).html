<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivateShare</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;--surface:#16161a;--surface2:#1e1e24;--surface3:#25252c;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.13);
  --accent:#7c6af7;--accent-dim:rgba(124,106,247,0.15);--accent-glow:rgba(124,106,247,0.25);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
  --yellow:#f59e0b;--red:#ef4444;
  --text:#f0f0f4;--text2:#9090a0;--text3:#55556a;
  --sans:'Inter',sans-serif;--r:10px;--rl:14px;
}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── Lobby ── */
#lobby{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2rem}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:44px;height:44px;border-radius:12px;background:var(--accent-dim);border:1px solid var(--accent-glow);display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.brand-name{font-size:20px;font-weight:600;letter-spacing:-0.03em}
.brand-name span{color:var(--accent)}

.lobby-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2rem;display:flex;flex-direction:column;gap:1.25rem}
.lobby-card h2{font-size:16px;font-weight:500;color:var(--text)}
.lobby-card p{font-size:13px;color:var(--text2);line-height:1.6}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:var(--text3);letter-spacing:.03em;text-transform:uppercase}
.field input{height:42px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:var(--sans);padding:0 14px;transition:border .15s}
.field input:focus{outline:none;border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}

.room-row{display:flex;gap:8px}
.room-row input{flex:1}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:42px;padding:0 18px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:var(--border-h)}
.btn:active{transform:scale(.97)}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-accent:hover{background:#6b59e8;border-color:#6b59e8}
.btn-full{width:100%}
.btn-icon{width:42px;height:42px;padding:0;border-radius:var(--r);flex-shrink:0}

.privacy-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.privacy-row svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.privacy-row span{color:var(--green)}

.divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Meeting ── */
#meeting{display:none;flex:1;flex-direction:column}
.meeting-header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.meeting-header .brand-name{font-size:15px}
.room-pill{font-size:12px;font-family:monospace;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:3px 12px;color:var(--text2)}
.mh-spacer{flex:1}
.conn-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);background:var(--surface2);border-radius:99px;padding:4px 12px;border:1px solid var(--border)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.conn-dot.green{background:var(--green);box-shadow:0 0 5px var(--green)}
.conn-dot.yellow{background:var(--yellow);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

#jitsi-container{flex:1;background:#000;position:relative}
#jitsi-container iframe{width:100%;height:100%;border:none;display:block}

.loading-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0a0d}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:13px;color:var(--text2)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border-h);color:var(--text);font-size:13px;padding:9px 18px;border-radius:99px;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:99px}
</style>
</head>
<body>

<!-- ══ LOBBY ══ -->
<div id="lobby">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
    </div>
    <div class="brand-name">Private<span>Share</span></div>
  </div>

  <div class="lobby-card">
    <div>
      <h2>Démarrer une session privée</h2>
      <p style="margin-top:6px">Partage d'écran + son, directement dans le navigateur. Aucune installation requise.</p>
    </div>

    <div class="field">
      <label>Votre nom</label>
      <input type="text" id="input-name" placeholder="Ex : Saida" maxlength="30" />
    </div>

    <div class="field">
      <label>Nom de la salle</label>
      <div class="room-row">
        <input type="text" id="input-room" placeholder="Ex : reunion-privee-2024" maxlength="40" />
        <button class="btn btn-icon" onclick="randomRoom()" title="Générer un nom aléatoire">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>

    <button class="btn btn-accent btn-full" onclick="joinRoom()">
      <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      Rejoindre la salle
    </button>

    <div class="divider">ou partagez un lien direct</div>

    <button class="btn btn-full" onclick="copyLink()">
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Copier le lien de la salle
    </button>

    <div class="privacy-row">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Chiffré de bout en bout</span>
      <span style="color:var(--text3)">· Aucun compte requis · Son natif sur Mac</span>
    </div>
  </div>
</div>

<!-- ══ MEETING ══ -->
<div id="meeting">
  <div class="meeting-header">
    <div class="brand-icon" style="width:32px;height:32px;border-radius:8px">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
    </div>
    <div class="brand-name">Private<span>Share</span></div>
    <div class="room-pill" id="header-room"></div>
    <div class="mh-spacer"></div>
    <div class="conn-badge">
      <div class="conn-dot yellow" id="conn-dot"></div>
      <span id="conn-text">Connexion…</span>
    </div>
    <button class="btn" onclick="leaveRoom()" style="height:34px;font-size:13px;color:var(--red);border-color:rgba(239,68,68,.3)">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Quitter
    </button>
  </div>
  <div id="jitsi-container">
    <div class="loading-screen" id="loading-screen">
      <div class="spinner"></div>
      <p>Chargement de la salle…</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
let api = null;
const WORDS_A = ['lune','mer','foret','ciel','vent','neige','nuage','soleil','riviere','montagne'];
const WORDS_B = ['bleue','calme','libre','douce','vive','pure','claire','sereine','rapide','belle'];
const WORDS_C = ['2024','x','z','alpha','prime','one','duo','max','pro','neo'];

function randomRoom() {
  const a = WORDS_A[Math.floor(Math.random()*WORDS_A.length)];
  const b = WORDS_B[Math.floor(Math.random()*WORDS_B.length)];
  const c = WORDS_C[Math.floor(Math.random()*WORDS_C.length)];
  document.getElementById('input-room').value = a+'-'+b+'-'+c;
}

function getRoomFromURL() {
  const p = new URLSearchParams(location.search);
  return p.get('room') || '';
}

function getRoomName() {
  return (document.getElementById('input-room').value.trim() || 'salle-privee')
    .toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}

function getUserName() {
  return document.getElementById('input-name').value.trim() || 'Anonyme';
}

function copyLink() {
  const room = getRoomName();
  const url = location.origin + location.pathname + '?room=' + encodeURIComponent(room);
  navigator.clipboard.writeText(url).then(() => toast('Lien copié !'));
}

function joinRoom() {
  const room = getRoomName();
  const name = getUserName();
  if (!room) { toast('Entrez un nom de salle'); return; }

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('meeting').style.display = 'flex';
  document.getElementById('header-room').textContent = '# ' + room;

  // Push room to URL so link sharing works
  const url = new URL(location.href);
  url.searchParams.set('room', room);
  history.replaceState({}, '', url);

  loadJitsi(room, name);
}

function loadJitsi(room, displayName) {
  const container = document.getElementById('jitsi-container');

  const options = {
    roomName: 'privateshare-' + room,
    parentNode: container,
    userInfo: { displayName },
    configOverwrite: {
      startWithAudioMuted: false,
      startWithVideoMuted: true,       // pas de webcam par défaut
      enableWelcomePage: false,
      prejoinPageEnabled: false,
      disableDeepLinking: true,
      // Son : activer toutes les sources
      enableNoAudioDetection: false,
      enableNoisyMicDetection: false,
      // Qualité
      resolution: 1080,
      constraints: {
        video: {
          aspectRatio: 16/9,
          height: { ideal: 1080, max: 1080, min: 180 },
          frameRate: { ideal: 30, max: 60 }
        }
      },
      // Désactiver fonctions inutiles
      disableThirdPartyRequests: true,
      analytics: { disabled: true },
      disableProfile: true,
      hideConferenceSubject: true,
      hideConferenceTimer: false,
      toolbarButtons: [
        'microphone','camera','desktop','fullscreen',
        'fodeviceselection','tileview','settings','hangup'
      ],
    },
    interfaceConfigOverwrite: {
      SHOW_JITSI_WATERMARK: false,
      SHOW_WATERMARK_FOR_GUESTS: false,
      SHOW_BRAND_WATERMARK: false,
      BRAND_WATERMARK_LINK: '',
      DEFAULT_BACKGROUND: '#0a0a0d',
      DISABLE_VIDEO_BACKGROUND: false,
      TOOLBAR_ALWAYS_VISIBLE: false,
      MOBILE_APP_PROMO: false,
      HIDE_INVITE_MORE_HEADER: true,
      RECENT_LIST_ENABLED: false,
      SETTINGS_SECTIONS: ['devices','language'],
      FILM_STRIP_MAX_HEIGHT: 120,
    },
    onload: () => {
      document.getElementById('loading-screen').style.display = 'none';
    }
  };

  api = new JitsiMeetExternalAPI('meet.jit.si', options);

  api.addEventListener('videoConferenceJoined', () => {
    document.getElementById('conn-dot').className = 'conn-dot green';
    document.getElementById('conn-text').textContent = 'Connecté';
    document.getElementById('loading-screen').style.display = 'none';
    toast('Salle rejointe — partagez le lien pour inviter');
  });

  api.addEventListener('videoConferenceLeft', () => {
    document.getElementById('conn-dot').className = 'conn-dot';
    document.getElementById('conn-text').textContent = 'Déconnecté';
  });

  api.addEventListener('participantJoined', e => {
    toast('Participant rejoint : ' + (e.displayName || 'Anonyme'));
  });

  api.addEventListener('participantLeft', e => {
    toast('Participant parti');
  });

  api.addEventListener('errorOccurred', e => {
    console.error('Jitsi error', e);
  });
}

function leaveRoom() {
  if (api) { api.dispose(); api = null; }
  document.getElementById('meeting').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('loading-screen').style.display = 'flex';
  document.getElementById('conn-dot').className = 'conn-dot yellow';
  document.getElementById('conn-text').textContent = 'Connexion…';
  // Remove room from URL
  const url = new URL(location.href);
  url.searchParams.delete('room');
  history.replaceState({}, '', url);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// Auto-join si URL contient ?room=
window.addEventListener('load', () => {
  const room = getRoomFromURL();
  if (room) {
    document.getElementById('input-room').value = room;
    // Petit délai pour laisser l'API Jitsi se charger
    setTimeout(() => joinRoom(), 300);
  } else {
    randomRoom();
  }
});
</script>
</body>
</html>
